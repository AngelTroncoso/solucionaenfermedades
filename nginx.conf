# Configuración de Nginx para servir el frontend y backend

server {
    listen 80;
    server_name localhost;

    # Configuración para archivos estáticos del frontend
    location / {
        root /app/frontend/dist/client;
        try_files $uri $uri/ /index.html;

        # Configuración de caché para archivos estáticos
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Configuración para aplicaciones de una sola página (SPA)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }
    }

    # Configuración para assets estáticos
    location /assets/ {
        root /app/frontend/dist/client;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Configuración para el backend (si es necesario)
    location /api/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Configuración para WebSocket (si el backend lo usa)
    location /ws/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Manejo de errores
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}