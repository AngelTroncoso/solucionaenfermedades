# ---------------------------------------------------------------------------
# 5. TARGETS MOLECULARES (Molecular Targets)
# ---------------------------------------------------------------------------
# Diccionario de targets moleculares con información relevante.
targets_moleculares:
  AMPK:
    nombre_completo: "Proteína quinasa activada por AMP"
    tipo: "Quinasa"
    via: "Metabolismo energético"
    enfermedades_asociadas:
      - "Diabetes tipo 2"
      - "Cáncer"
      - "Enfermedades cardiovasculares"
    farmacos_moduladores:
      - "Metformina (activador)"
      - "AICAR (activador)"

  mTOR:
    nombre_completo: "Mammalian Target of Rapamycin"
    tipo: "Quinasa"
    via: "Crecimiento y proliferación celular"
    enfermedades_asociadas:
      - "Cáncer"
      - "Envejecimiento"
      - "Enfermedades neurodegenerativas"
    farmacos_moduladores:
      - "Rapamicina (inhibidor)"
      - "Everolimus (inhibidor)"

  CFTR:
    nombre_completo: "Cystic Fibrosis Transmembrane Conductance Regulator"
    tipo: "Canal iónico"
    via: "Transporte de cloro"
    enfermedades_asociadas:
      - "Fibrosis quística"
    farmacos_moduladores:
      - "Ivacaftor (potenciador)"
      - "Lumacaftor (corrector)"

  TNF-α:
    nombre_completo: "Factor de Necrosis Tumoral alfa"
    tipo: "Citocina"
    via: "Inflamación"
    enfermedades_asociadas:
      - "Artritis reumatoide"
      - "Enfermedad inflamatoria intestinal"
      - "Fibrosis hepática"
      - "Sepsis"
    farmacos_moduladores:
      - "Pentoxifilina (inhibidor de síntesis)"
      - "Infliximab (anticuerpo monoclonal)"
      - "Adalimumab (anticuerpo monoclonal)"

  PDE5:
    nombre_completo: "Fosfodiesterasa 5"
    tipo: "Fosfodiesterasa"
    via: "Señalización de cGMP"
    enfermedades_asociadas:
      - "Disfunción eréctil"
      - "Hipertensión arterial pulmonar"
      - "Preeclampsia"
    farmacos_moduladores:
      - "Sildenafil (inhibidor)"
      - "Tadalafil (inhibidor)"

# ---------------------------------------------------------------------------
# 6. MECANISMOS DE ACCIÓN (Mechanisms of Action)
# ---------------------------------------------------------------------------
# Descripción de mecanismos de acción relevantes para reposicionamiento.
mecanismos_accion:
  activacion_AMPK:
    descripcion: "Activación de la proteína quinasa AMPK, regulador maestro del metabolismo energético"
    efectos: "Inhibición de proliferación celular, mejora de sensibilidad a insulina"
    farmacos_ejemplo: ["Metformina", "AICAR"]
    potencial_reposicionamiento: "Cáncer, envejecimiento, enfermedades metabólicas"

  inhibicion_mTOR:
    descripcion: "Inhibición del complejo mTORC1, regulador del crecimiento celular"
    efectos: "Supresión de proliferación, inducción de autofagia"
    farmacos_ejemplo: ["Rapamicina", "Everolimus"]
    potencial_reposicionamiento: "Cáncer, longevidad, enfermedades neurodegenerativas"

  inhibicion_TNF:
    descripcion: "Inhibición de la síntesis o actividad del Factor de Necrosis Tumoral alfa"
    efectos: "Reducción de inflamación, modulación de respuesta inmune"
    farmacos_ejemplo: ["Pentoxifilina", "Infliximab"]
    potencial_reposicionamiento: "Fibrosis hepática, Alzheimer, sepsis"

  vasodilatacion_NO:
    descripcion: "Vasodilatación mediada por óxido nítrico y vía cGMP"
    efectos: "Mejora de flujo sanguíneo, reducción de presión arterial"
    farmacos_ejemplo: ["Sildenafil", "Tadalafil"]
    potencial_reposicionamiento: "Preeclampsia, Alzheimer vascular"

  inhibicion_ALDH:
    descripcion: "Inhibición de aldehído deshidrogenasa, enzima metabólica"
    efectos: "Acumulación de aldehídos tóxicos, inhibición de células madre cancerosas"
    farmacos_ejemplo: ["Disulfiram"]
    potencial_reposicionamiento: "Cáncer, fibrosis quística, infecciones resistentes"

# ---------------------------------------------------------------------------
# 7. BENCHMARKS DE VALIDACIÓN (Validation Benchmarks)
# ---------------------------------------------------------------------------
# Rangos típicos de métricas para diferentes tipos de modelos computacionales.
benchmarks_validacion:
  QSAR_RandomForest:
    dataset: "ChEMBL kinase inhibitors"
    r2_esperado: [0.5, 0.8]
    rmse_esperado: [0.6, 1.2]
    min_muestras: 100
    interpretacion:
      r2_mayor_0.7: "Modelo predictivo útil para screening virtual"
      r2_entre_0.5_0.7: "Modelo moderado, útil para ranking de compuestos"
      r2_menor_0.5: "Modelo insuficiente, requiere mejora"

  docking_autodock:
    afinidad_tipica: [-12.0, -6.0]
    rmsd_aceptable: 2.0
    min_hits: 10
    interpretacion:
      afinidad_menor_menos_9: "Unión fuerte, candidato prometedor"
      afinidad_entre_menos_9_menos_7: "Unión moderada, requiere optimización"
      afinidad_mayor_menos_7: "Unión débil, no viable"

  admet_lipinski:
    tasa_paso: 0.8
    absorcion_tipica: 0.7
    reglas:
      - "Peso molecular < 500 Da"
      - "LogP < 5"
      - "Donores de H < 5"
      - "Aceptores de H < 10"
      - "Rotatable bonds < 10"